<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="/frontend/config/config.js"></script>
    <script>loadHead("Materiales")</script>
    <script type="module" src="/frontend/javascript/controllers_f/MaterialController.js"></script>
</head>
<body class="bg-white text-dark">

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- LAYOUT CON SIDEBAR -->
    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div id="sidebar-placeholder" class="sidebar-bg col-auto p-0"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col p-3 p-md-4 main-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="mb-0">Materiales</h1>
                    <a href="https://www.notion.so/TU_PAGINA" target="_blank"
                       class="text-dark" title="Abrir ayuda en Notion">
                        <i class="bi bi-question-circle fs-3"></i>
                    </a>
                </div>

                <div id="breadcrumb-placeholder"></div>

                <!-- Tabla con filtros -->
                <div class="container mt-4 p-0">
                    <div id="filtroTabla" class="m-0 row d-flex justify-content-around">
                        <div class="col-md-5 d-flex align-items-center m-1">
                            <label class="m-2" for="nombre">Nombre:</label>
                            <input placeholder="Nombre" id="nombre" type="text"
                                   class="form-control m-1 filtro" data-col="1">
                        </div>
                        <div class="col-md-3 d-flex align-items-center m-1">
                            <label class="m-2" for="estado">Estado:</label>
                            <select class="form-select m-1 filtro" id="estado" data-col="3">
                                <option value="">Todos</option>
                                <option value="ALTA">ALTA</option>
                                <option value="BAJA">BAJA</option>
                            </select>
                        </div>
                    </div>

                    <table class="table table-bordered table-striped" id="tabla">
                        <thead class="table-dark">
                            <tr>
                                <th class="d-none d-md-table-cell">ID</th>
                                <th>Nombre</th>
                                <th class="d-none d-md-table-cell">Descripción</th>
                                <th>Estado</th>
                                <th class="d-none d-md-table-cell">Categoría</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Los datos se cargarán dinámicamente -->
                        </tbody>
                    </table>
                </div>

                <!-- Formulario insertar -->
                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Insertar Material</h5>
                    <form id="formInsertar" class="mx-auto">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="insertCategoria" class="form-label">Categoría <span class="text-danger">*</span></label>
                                <select class="form-select" id="insertCategoria" name="id_categoria" required>
                                    <option value="">Seleccione una categoría...</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="insertNombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="insertNombre" name="nombre" required>
                            </div>
                            <div class="col-md-4">
                                <label for="insertEstado" class="form-label">Estado <span class="text-danger">*</span></label>
                                <select class="form-select" id="insertEstado" name="estado" required>
                                    <option value="">Seleccione...</option>
                                    <option value="ALTA">ALTA</option>
                                    <option value="BAJA">BAJA</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="insertDescripcion" class="form-label">Descripción <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="insertDescripcion" name="descripcion" rows="3" required></textarea>
                            </div>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary">Insertar</button>
                        </div>
                    </form>
                </div>

            </main>
        </div>
    </div>

    <!--  MODAL VER  -->
    <div class="modal fade" id="modalVer" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalle del material</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalVerBody"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!--  MODAL EDITAR  -->
    <!-- modal-xl para que quepan las pestañas de asignaciones -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEditarLabel">Editar Material</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditar">
                        <!-- El contenido (campos + pestañas de asignaciones) se genera dinámicamente -->
                    </form>
                </div>
                <!-- Sin footer: el botón "Guardar cambios" se inyecta dentro del form -->
            </div>
        </div>
    </div>

    <!--  MODAL ELIMINAR  -->
    <div class="modal fade" id="modalEliminar" tabindex="-1" aria-labelledby="modalEliminarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEliminarLabel">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <!-- Se rellena dinámicamente con nombre del material -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div id="footer-placeholder" class="mt-auto"></div>

    <!-- ALERTAS -->
    <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

</body>
</html>
