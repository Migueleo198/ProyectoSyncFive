<!DOCTYPE html>
<html lang="es">

<body class="text-dark d-flex flex-column">

                                <td>-</td>
                                <td>-</td>
                                <td>-</td>
                            </tr>
                            <tr>
                                <td colspan="5" class="text-muted text-start px-2"
                                    style="font-size:11px">Cargando datos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div id="footer-placeholder" class="mt-auto"></div>

    <!-- ELIMINADO EL SCRIPT DUPLICADO -->

    <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>
