<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="/frontend/config/config.js"></script>
    <script>loadHead("Permisos", { fullcalendar: true })</script>
    <script type="module" src="/frontend/javascript/controllers_f/PermisoController.js"></script>
</head>
<body class="bg-white text-dark d-flex flex-column">

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- LAYOUT CON SIDEBAR -->
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div id="sidebar-placeholder" class="sidebar-bg col-auto p-0"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col p-3 p-md-4 main-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="mb-0 fw-bold">Permisos</h1>
                        <small class="text-muted">Solicitudes y control de permisos del personal</small>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <a href="/permisos/motivos" 
                           class="btn btn-outline-secondary btn-gestion" 
                           data-permiso="motivos">
                            <i class="bi bi-gear me-1"></i> Administrar Motivos
                        </a>
                        <a href="https://www.notion.so/09_Permisos_Bienestar-31b0bf35f606804a9b8de4375b3e9592" target="_blank" 
                        class="text-muted" title="Ayuda">
                            <i class="bi bi-question-circle fs-4"></i>
                        </a>
                    </div>
                </div>

                <!-- MIGAS DE PAN -->
                <div id="breadcrumb-placeholder"></div>
                
                <div class="container mt-4 p-0"> 
                    <h2 class="d-flex align-items-center">Permisos</h2>

                    <div id="filtroTabla" class="m-0 row d-flex justify-content-center">
                        <div class="col-lg-3 col-md-3 col-sm-12 d-flex align-items-center m-1">
                            <label class="me-2 text-nowrap" for="filtroMotivo">Motivo:</label>
                            <select class="form-select form-select-sm" id="filtroMotivo">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="col-lg-3 col-md-3 col-sm-12 d-flex align-items-center m-1">
                            <label class="me-2 text-nowrap" for="filtroEstado">Estado:</label>
                            <select class="form-select form-select-sm" id="filtroEstado">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="col-lg-3 col-md-3 col-sm-12 d-flex align-items-center m-1">
                            <label class="me-2 text-nowrap" for="filtroFecha">Inicio:</label>
                            <input type="date" class="form-control form-control-sm" id="filtroFecha">
                        </div>
                    </div>


                    <table class="table table-bordered table-striped" id="tabla">
                        <thead class="table-dark">
                            <tr>
                                <th class="d-none d-md-table-cell">ID Permiso</th>
                                <th>Motivo</th>
                                <th class="d-none d-lg-table-cell">Solicitante</th>
                                <th>Inicio</th>
                                <th>Fin</th>
                                <th>Estado</th>
                                <th class="d-none d-md-table-cell">Descripción</th>
                                <th>Acción</th>
                            </tr>
                        </thead>

                        <tbody></tbody>
                    </table>
                    <div id="pagination-permiso" class="mt-3"></div>
                </div>

                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Solicitar permiso</h5>
                    <form id="formInsertar" method="POST" class="mx-auto">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label" for="motivo">Motivo</label>
                                <select class="form-select" id="motivo" name="cod_motivo" required>
                                    <option value="">Seleccione motivo...</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="fechaHoraInicio">Inicio efectivo</label>
                                <input type="datetime-local" class="form-control" id="fechaHoraInicio" name="fecha_hora_inicio" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="fechaHoraFin">Fin efectivo</label>
                                <input type="datetime-local" class="form-control" id="fechaHoraFin" name="fecha_hora_fin" data-auto-calculated="true" required>
                                <div class="form-text">Se completa automaticamente segun los dias del motivo, pero puedes ajustarlo manualmente.</div>
                            </div>
                            <div class="col-md-12 mt-3">
                                <label class="form-label" for="descripcionPermiso">Descripción</label>
                                <textarea class="form-control" id="descripcionPermiso" name="descripcion" rows="3" placeholder="Añade contexto si necesitas ampliar la solicitud"></textarea>
                            </div>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary">Insertar</button>
                        </div>
                    </form>
                </div>

            </main>
        </div>
    </div>


<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar permiso</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditar">
                    <!-- Campos dinámicos -->
                </form>
            </div>
        </div>
    </div>
</div>

    <!-- Modal de ver -->
    <div class="modal fade" id="modalVer" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Detalle del permiso</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="modalVerBody">
                   <!-- Body dinamico del modal-->
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                </div>

            </div>
        </div>
    </div>
    <!-- FOOTER -->
    <div id="footer-placeholder" class="mt-auto"></div>
    <!-- ALERT-->
    <div id="alert-container" class="position-fixed top-0 end-0 p-3"></div>


</body>

</html>
