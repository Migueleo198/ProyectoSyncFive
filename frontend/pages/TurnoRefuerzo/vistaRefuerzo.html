<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turnos de Refuerzo</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- Configuración y rutas absolutas -->
    <script src="/frontend/config/config.js"></script>

    <!-- CSS del proyecto usando loadCSS() -->
    <script>
        loadCSS("header_footer.css");
        loadCSS("plantilla_css.css");
        loadFavicon("favicon.png");
    </script>

    <!-- JS dependientes -->
    <script type="module" src="/frontend/javascript/helpers/header_footer.js" defer></script>
    <script src="/frontend/javascript/helpers/script_filtro_tabla.js" defer></script>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Controlador específico de la vista -->
    <script type="module"
        src="/frontend/javascript/controllers_f/RefuerzoController.js">
    </script>

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@latest/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@latest/index.global.min.js"></script>
</head>

<body class="bg-white text-dark d-flex flex-column">
    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- LAYOUT CON SIDEBAR -->
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div id="sidebar-placeholder" class="sidebar-bg col-auto p-0"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col p-3 p-md-4 main-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="mb-0">Control de Turnos de Refuerzo</h1>
                    <a href="https://www.notion.so/TU_PAGINA" target="_blank" 
                    class="text-dark" title="Abrir ayuda en Notion">
                        <i class="bi bi-question-circle fs-3"></i>
                    </a>
                </div>

                <div>
                    <p>[Migas de pan]</p>
                </div>

                <!-- CALENDARIO -->
                <div class="container mt-4 p-0"> 
                    <h2 class="d-flex">Calendario</h2>
                    <div id="calendar"></div>
                    <script>
                    document.addEventListener("DOMContentLoaded", function () {
                        var calendarEl = document.getElementById("calendar");
                        var calendar = new FullCalendar.Calendar(calendarEl, {
                            themeSystem: "bootstrap5",
                            initialView: "dayGridMonth",
                            selectable: true,
                            dateClick: function(info) {
                                const titulo = prompt("Título del aviso:");
                                if (!titulo) return;
                                calendar.addEvent({
                                    title: titulo,
                                    start: info.dateStr,
                                    allDay: true
                                });
                            }
                        });
                        calendar.render();
                    });
                    </script>
                </div>

                <!-- Contenedor tabla con filtro -->
                <div class="container mt-4 p-0"> 
                    <h2 class="d-flex align-items-center">Turnos de Refuerzo</h2>

                    <div id="filtroTabla" class="m-0 row d-flex justify-content-end">
                        <div class="col-md-5 d-flex align-items-center m-1">
                            <label class="m-2" for="filtroNombreRefuerzo">Nombre:</label>
                            <select class="form-select m-1" id="filtroNombreRefuerzo">
                                <option value="">Seleccione...</option>
                            </select>
                        </div>
                    </div>

                    <table class="table table-bordered table-striped" id="tabla">
                        <thead class="table-dark">
                            <tr>
                                <th class="d-none d-md-table-cell">ID Refuerzo</th>
                                <th>f_inicio</th>
                                <th>f_Fin</th>
                                <th>horas</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- Contenedor insertar Turno de Refuerzo -->
                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Insertar nuevo Turno de Refuerzo</h5>
                    <form id="formInsertarTurnoRefuerzo" class="mx-auto">
                        <div class="row mb-3">
                            <div class="col-md-4 col-sm-6">
                                <label class="m-2" for="f_inicio">f_inicio:</label>
                                <input type="date" class="form-control form-control-sm mt-1" id="f_inicio" name="f_inicio">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <label class="m-2" for="f_fin">Fecha Fin:</label>
                                <input type="date" class="form-control" id="f_fin" name="f_fin">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <label class="m-2" for="horas">Hora:</label>
                                <input type="int" class="form-control form-control-sm mt-1" id="horas" name="horas">
                            </div>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary" id="btnInsertarRefuerzo">Insertar</button>
                        </div>
                    </form>
                </div>

                <!-- Contenedor asignar persona a Turno de Refuerzo -->
                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Asignar persona a Turno de Refuerzo</h5>
                    <form id="formInsertarUsuario" class="mx-auto">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="ID_Turno_Refuerzo" class="m-2 form-label">ID Turno Refuerzo</label>
                                <select class="form-select" id="ID_Turno_Refuerzo" name="ID_Turno_Refuerzo">
                                    <option value="">Seleccione turno de refuerzo...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="ID_persona" class="m-2 form-label">Persona</label>
                                <select class="form-select" id="ID_persona" name="ID_persona">
                                    <option value="">Seleccione persona...</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary" id="btnInsertarUsuario">Asignar</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal de edición -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEditarLabel">Editar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditar">
                        <!-- Los campos del formulario se generarán dinámicamente -->
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de ver -->
    <div class="modal fade" id="modalVer" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalle del Turno de Refuerzo</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalVerBody">
                    <!-- Body dinámico del modal -->
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div id="footer-placeholder" class="mt-auto"></div>
    <!-- ALERT -->
    <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

</body>
</html>
