<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="/frontend/config/config.js"></script>
    <script>loadHead("Gestión de Refuerzos")</script>
    <script type="module" src="/frontend/javascript/controllers_f/RefuerzoController.js"></script>
</head>

<body class="bg-white text-dark d-flex flex-column">
    <div id="header-placeholder"></div>

    <div class="container-fluid">
        <div class="row">
            <div id="sidebar-placeholder" class="sidebar-bg col-auto p-0"></div>

            <main class="col p-3 p-md-4 main-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="mb-0 fw-bold">Turnos de Refuerzo</h1>
                        <small class="text-muted">Solicitudes de turnos extra</small>
                    </div>
                    <a href="https://www.notion.so/07_Guardias_Cuadrantes-31b0bf35f60680b29d0bfa3a87b4d750" target="_blank" 
                    class="text-muted" title="Ayuda">
                        <i class="bi bi-question-circle fs-4"></i>
                    </a>
                </div>

                <div id="breadcrumb-placeholder"></div>

                <!-- Tabla con filtros -->
                <div class="container mt-4 p-0">
                    <div id="filtroTabla" class="m-0 row d-flex justify-content-center">
                        <div class="col-md-4 d-flex align-items-center m-1">
                            <label class="m-2" for="filtroFecha">Fecha inicio:</label>
                            <input type="date" class="form-control m-1" id="filtroFecha">
                        </div>
                        <div class="col-md-4 d-flex align-items-center m-1">
                            <label class="m-2" for="filtroHoras">Horas:</label>
                            <input type="number" class="form-control m-1" id="filtroHoras" placeholder="Nº horas">
                        </div>
                    </div>

                    <table class="table table-bordered table-striped" id="tabla">
                        <thead class="table-dark">
                            <tr>
                                <th class="d-none d-md-table-cell">ID Refuerzo</th>
                                <th>Fecha inicio</th>
                                <th>Fecha fin</th>
                                <th>Horas</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div id="pagination-refuerzo" class="mt-3"></div>
                </div>

                <!-- Insertar Turno de Refuerzo -->
                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Insertar nuevo Turno de Refuerzo</h5>
                    <form id="formInsertarTurnoRefuerzo" class="mx-auto">
                        <div class="row mb-3">
                            <div class="col-md-4 col-sm-6">
                                <label class="m-2" for="f_inicio">Fecha inicio:</label>
                                <input type="date" class="form-control form-control-sm mt-1" id="f_inicio" name="f_inicio">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <label class="m-2" for="f_fin">Fecha fin:</label>
                                <input type="date" class="form-control" id="f_fin" name="f_fin">
                            </div>
                            <div class="col-md-4 col-sm-6">
                                <label class="m-2" for="horas">Horas:</label>
                                <input type="number" class="form-control form-control-sm mt-1" id="horas" name="horas">
                            </div>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary" id="btnInsertarRefuerzo">Insertar</button>
                        </div>
                    </form>
                </div>

                <!-- Asignar persona a Turno de Refuerzo -->
                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Asignar persona a Turno de Refuerzo</h5>
                    <form id="formInsertarUsuario" class="mx-auto">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="ID_Turno_Refuerzo" class="m-2 form-label">ID Turno Refuerzo</label>
                                <select class="form-select" id="ID_Turno_Refuerzo" name="ID_Turno_Refuerzo">
                                    <option value="">Seleccione turno de refuerzo...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="ID_persona" class="m-2 form-label">Persona</label>
                                <select class="form-select" id="ID_persona" name="ID_persona">
                                    <option value="">Seleccione persona...</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary" id="btnInsertarUsuario">Asignar</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal editar -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEditarLabel">Editar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditar"></form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal ver -->
    <div class="modal fade" id="modalVer" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalle del Turno de Refuerzo</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalVerBody"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder" class="mt-auto"></div>
    <div id="alert-container" class="position-fixed top-0 end-0 p-3"></div>
</body>
</html>
