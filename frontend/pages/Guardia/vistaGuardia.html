<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Guardias</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- Configuración y rutas absolutas -->
    <script src="/frontend/config/config.js"></script>

    <!-- CSS del proyecto usando loadCSS() -->
    <script>
        loadCSS("header_footer.css");
        loadCSS("plantilla_css.css");
        // Cargar favicon dinámicamente
        loadFavicon("favicon.png");
    </script>

    <!-- JS dependientes -->
    <script type="module" src="/frontend/javascript/helpers/header_footer.js" defer></script>
    <script src="/frontend/javascript/helpers/script_filtro_tabla.js" defer></script>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Controlador específico de la vista -->
    <script type="module"
        src="/frontend/javascript/controllers_f/GuardiaController.js">
    </script>

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@latest/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@latest/index.global.min.js"></script>
</head>

<body class="bg-white text-dark d-flex flex-column">
    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- LAYOUT CON SIDEBAR -->
    <div class="container-fluid">
        <div class="row">
            <!-- SIDEBAR -->
            <div id="sidebar-placeholder" class="sidebar-bg col-auto p-0"></div>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col p-3 p-md-4 main-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="mb-0">Control de Guardias</h1>
                    <!-- Icono de ayuda que redirige a Notion -->
                    <a href="https://www.notion.so/TU_PAGINA" target="_blank" 
                    class="text-dark" title="Abrir ayuda en Notion">
                        <i class="bi bi-question-circle fs-3"></i>
                    </a>
                </div>

                <div>
                    <p>[Migas de pan]</p>
                </div>
                <!-- CALENDARIO INCOMPLETO -->
                <div class="container mt-4 p-0"> 
                    <h2 class="d-flex">Calendario</h2>
                    <div id="calendar"></div>
                        <script>
                        document.addEventListener("DOMContentLoaded", function () {
                            var calendarEl = document.getElementById("calendar");

                            var calendar = new FullCalendar.Calendar(calendarEl, {
                                themeSystem: "bootstrap5",
                                initialView: "dayGridMonth",
                                selectable: true,

                                dateClick: function(info) {
                                    // Aquí decides qué hacer cuando se hace clic en un día
                                    const titulo = prompt("Título del aviso:");
                                    if (!titulo) return;

                                    calendar.addEvent({
                                        title: titulo,
                                        start: info.dateStr,
                                        allDay: true
                                    });
                                }
                            });

                            calendar.render();
                        });
                        </script>
                </div>
                <!-- Contenedor tabla con filtro-->
                <div class="container mt-4 p-0"> 
                    <h2 class="d-flex align-items-center">Guardias</h2>

                    <div id="filtroTabla" class="m-0 row d-flex justify-content-end"> <!-- Filtro -->
                        <div class="col-md-5 d-flex align-items-center m-1">
                        <label class="m-2" for="grupo">Nombre:</label>
                            <select class="form-select m-1"  id="filtroNombreCarnet">
                                <option value="">Seleccione...</option>
                            </select>
                        </div>
                    </div>


                    <table class="table table-bordered table-striped" id="tabla">
                        <thead class="table-dark">
                            <tr>
                                <th class="d-none d-md-table-cell">ID Guardia</th>
                                <th>Fecha</th>
                                <th>H_inicio</th>
                                <th>H_fin</th>
                                <th>Notas</th>
                                <th>Accion</th>
                            </tr>
                        </thead>

                        <tbody></tbody>
                    </table>
                </div>
                
                <!-- Contenedor insertar Guardia -->
                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Insertar nueva guardia</h5>
                    <form id="formInsertarGuardia" class="mx-auto">
                        <!-- Campos en la misma fila -->
                        <div class="row mb-3">
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="fecha">Fecha:</label>
                                <input type="date" class="form-control form-control-sm mt-1 " id="fecha" name="fecha" data-col="2">                            </div>
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="h_inicio">Hora inicio:</label>
                                <input type="number" class="form-control form-control-sm mt-1 " id="h_inicio" name="h_inicio" data-col="2">
                            </div>
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="h_fin">Hora fin:</label>
                                <input type="number" class="form-control form-control-sm mt-1 " id="h_fin" name="h_fin" data-col="2">
                            </div>
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="notas">Notas:</label>
                                <input type="text" class="form-control" id="notas" name="notas" rows="2"></textarea>
                            </div>

                        </div>
                        <!-- Botones centrados debajo -->
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">
                                Limpiar
                            </button>
                            <button type="submit" class="btn btn-primary" id="btnInsertarGuardia">
                                Insertar
                            </button>
                        </div>
                    </form>
                </div>
                <!-- Contenedor insertar Usuario a Guardia -->
                <div class="contenedorInsertar container mt-5 p-4 border rounded">
                    <h5 class="text-center mb-4">Insertar usuario a guardia</h5>
                    <form id="formAsignarGuardia" class="mx-auto">
                        <!-- Campos en la misma fila -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="ID_Guardia" class="m-2 form-label">ID_Guardia</label>
                                <select class="form-select" id="seleccionarGuardia" name="id_guardia">
                                    <option value="">Seleccione guardia...</option>
                                </select>   
                            </div>
                            <div class="col-md-6">
                                <label for="n_funcionario" class="m-2 form-label">Persona</label>
                                <select class="form-select" id="n_funcionario" name="n_funcionario">
                                    <option value="">Seleccione persona...</option>
                                    <!-- Se llenará dinámicamente desde JS -->
                                </select>       
                            </div>
                                                        <div class="col-md-6">
                                <label for="n_funcionario" class="m-2 form-label">Persona</label>
                                <select class="form-select" id="n_funcionario" name="n_funcionario">
                                    <option value="">Seleccione persona...</option>
                                    <!-- Se llenará dinámicamente desde JS -->
                                </select>       
                            </div>
                        </div>
                        <!-- Botones centrados debajo -->
                        <div class="d-flex justify-content-center gap-2">
                            <button type="reset" class="btn btn-secondary">
                                Limpiar
                            </button>
                            <button type="submit" class="btn btn-primary" id="btnInsertarUsuario">
                                Insertar
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>


    <!-- Modal de edición -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEditarLabel">Editar registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditar" class="mx-auto">
                        <!-- Campos en la misma fila -->
                        <div class="row mb-3">
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="Fecha">Fecha:</label>
                                <input type="date" class="form-control form-control-sm mt-1" id="Fecha" data-col="2">
                            </div>
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="h_inicio">Hora inicio:</label>
                                <input type="text" class="form-control form-control-sm mt-1" id="h_inicio" data-col="2">
                            </div>
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="h_fin">Hora fin:</label>
                                <input type="text" class="form-control form-control-sm mt-1 " id="h_fin" data-col="2">
                            </div>
                            <div class="col-md-4 col-sm-6 ">
                                <label class="m-2" for="notas">notas:</label>
                                <input type="text" class="form-control form-control-sm mt-1 " id="notas" data-col="2">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal de eliminación -->
    <div class="modal fade" id="modalEliminar" tabindex="-1" aria-labelledby="modalEliminarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEliminarLabel">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    ¿Estás seguro de que deseas eliminar este registro?
                    <p class="text-muted mb-0">Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarEliminar">
                        Eliminar
                    </button> 
                </div>
            </div> 
        </div>
    </div>

    <!-- Modal de ver -->
    <div class="modal fade" id="modalVer" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Detalle del tipo</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="modalVerBody">
                   <!-- Body dinamico del modal-->
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                </div>

            </div>
        </div>
    </div>
    <!-- FOOTER -->
    <div id="footer-placeholder" class="mt-auto"></div>
    <!-- ALERT-->
    <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;"></div>

    
</body>

</html>
